name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example, v3.0.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: skilltap-linux-x64
          - runner: ubuntu-24.04-arm
            asset: skilltap-linux-arm64
          - runner: macos-15-intel
            asset: skilltap-darwin-x64
          - runner: macos-14
            asset: skilltap-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build release binary
        run: cargo build --locked --release -p skilltap

      - name: Prepare artifact
        run: |
          cp target/release/skilltap "${{ matrix.asset }}"
          strip "${{ matrix.asset }}"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            codesign --force --sign - "${{ matrix.asset }}"
            codesign --verify --verbose "${{ matrix.asset }}"
          fi

      - name: Verify artifact
        run: scripts/verify-binary.sh "./${{ matrix.asset }}"

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: skilltap-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum skilltap-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            skilltap-linux-x64
            skilltap-linux-arm64
            skilltap-darwin-x64
            skilltap-darwin-arm64
            checksums.txt

  notify-homebrew:
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: nklisch/homebrew-skilltap
          event-type: release
          client-payload: '{"version": "${{ env.RELEASE_TAG }}"}'
