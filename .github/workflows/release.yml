name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bun-target: bun-linux-arm64
          - os: macos-13
            target: darwin-x64
            bun-target: bun-darwin-x64
          - os: macos-14
            target: darwin-arm64
            bun-target: bun-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        run: |
          bun build packages/cli/src/index.ts \
            --compile \
            --target=${{ matrix.bun-target }} \
            --outfile=skilltap-${{ matrix.target }}

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: skilltap-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: skilltap-${{ matrix.target }}
          path: skilltap-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum skilltap-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            skilltap-*
            checksums.txt

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        run: |
          cd packages/cli && npm publish --provenance --access public
          cd ../core && npm publish --provenance --access public

  notify-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: nklisch/homebrew-skilltap
          event-type: release
          client-payload: '{"version": "${{ github.ref_name }}"}'
