name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binaries
        env:
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: |
          bun build packages/cli/src/index.ts --compile --target=bun-linux-x64   --outfile=skilltap-linux-x64
          bun build packages/cli/src/index.ts --compile --target=bun-linux-arm64 --outfile=skilltap-linux-arm64
          bun build packages/cli/src/index.ts --compile --target=bun-darwin-x64  --outfile=skilltap-darwin-x64
          bun build packages/cli/src/index.ts --compile --target=bun-darwin-arm64 --outfile=skilltap-darwin-arm64

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            skilltap-linux-x64
            skilltap-linux-arm64
            skilltap-darwin-x64
            skilltap-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: skilltap-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Generate checksums
        run: sha256sum skilltap-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            skilltap-*
            checksums.txt

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish packages
        run: |
          cd packages/cli && npm publish --provenance --access public
          cd ../core && npm publish --provenance --access public

  notify-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: nklisch/homebrew-skilltap
          event-type: release
          client-payload: '{"version": "${{ env.RELEASE_TAG }}"}'
