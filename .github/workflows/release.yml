name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example, v3.0.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag matches workspace version
        run: |
          VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)
          EXPECTED_TAG="v${VERSION}"
          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "error: release tag ${RELEASE_TAG} does not match Cargo workspace version ${EXPECTED_TAG}" >&2
            exit 1
          fi

  build:
    needs: validate
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: skilltap-linux-x64
          - runner: ubuntu-24.04-arm
            asset: skilltap-linux-arm64
          - runner: macos-15-intel
            asset: skilltap-darwin-x64
          - runner: macos-14
            asset: skilltap-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build release binary
        run: cargo build --locked --release -p skilltap

      - name: Test compiled binary contract
        run: scripts/verify-compiled-binary.sh target/release/skilltap

      - name: Prepare artifact
        run: |
          cp target/release/skilltap "${{ matrix.asset }}"
          strip "${{ matrix.asset }}"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            codesign --force --sign - "${{ matrix.asset }}"
            codesign --verify --verbose "${{ matrix.asset }}"
          fi

      - name: Verify artifact
        run: scripts/verify-binary.sh "./${{ matrix.asset }}"

      - name: Attest artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: skilltap-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum skilltap-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            skilltap-linux-x64
            skilltap-linux-arm64
            skilltap-darwin-x64
            skilltap-darwin-arm64
            checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - name: Check out skilltap release sources
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: source

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: nklisch/homebrew-skilltap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Synchronize formula source and checksums
        run: |
          cp source/homebrew-skilltap/Formula/skilltap.rb tap/Formula/skilltap.rb
          cp source/homebrew-skilltap/scripts/update-formula.sh tap/scripts/update-formula.sh
          chmod +x tap/scripts/update-formula.sh
          curl -fsSL \
            "https://github.com/nklisch/skilltap/releases/download/${RELEASE_TAG}/checksums.txt" \
            -o tap/checksums.txt
          cd tap
          ./scripts/update-formula.sh "${RELEASE_TAG}" checksums.txt
          rm checksums.txt

      - name: Create Homebrew update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit-message: "Update skilltap to ${{ env.RELEASE_TAG }}"
          title: "skilltap ${{ env.RELEASE_TAG }}"
          branch: "update-${{ env.RELEASE_TAG }}"
          body: |
            Synchronize the v3 formula and checksums for skilltap ${{ env.RELEASE_TAG }}.

            Generated by the skilltap release workflow.
