name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --locked --workspace

      - name: Build release binary
        run: cargo build --locked --release -p skilltap

      - name: Verify compiled binary
        run: scripts/verify-compiled-binary.sh target/release/skilltap

  macos-contracts:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Test workspace on native macOS
        run: cargo test --locked --workspace

      - name: Build release binary
        run: cargo build --locked --release -p skilltap

      - name: Verify compiled binary
        run: scripts/verify-compiled-binary.sh target/release/skilltap

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm --prefix website ci

      - name: Verify installation surface parity
        run: scripts/verify-install-surfaces.sh

      - name: Build website
        run: npm --prefix website run build
