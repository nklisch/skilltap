name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests (source mode)
        run: bun test

      - name: Build compiled binary
        run: bun run build

      - name: Verify binary smoke (--version, --help, doctor)
        run: scripts/verify-binary.sh ./skilltap

      # Re-run the CLI test suite with subprocess calls routed to the compiled
      # binary instead of `bun run --bun src/index.ts`. Catches behavioral
      # regressions specific to the --compile path (externals, dynamic imports,
      # bunfs resolution) that source-mode tests can't see.
      - name: Run CLI tests against compiled binary
        env:
          SKILLTAP_TEST_BIN: ${{ github.workspace }}/skilltap
        run: bun test packages/cli/
